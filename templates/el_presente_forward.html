<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #c3c3c3;
            font-family: Arial, sans-serif;
            text-align: center;
            box-sizing: border-box;
            justify-content: center;
            justify-items: center;
            color: #eaeaea;
            margin: 0px 0px 0px 0px;
            padding: 0px 0px 0px 0px;
        }
        
        .displayer{
            width:100%;
            margin:0px 0 0 0;
            background-color: rgba(0, 0, 0, 0);
            padding: 100px 0px 20px 0px;
            justify-content: center;
            justify-items: center;
        }
        
        a, button {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border:0px
        }
        a:hover {
            background-color:  #c0c0c0;
        }
        a.back{
            position: absolute;
            top: 0;
            left: 0;
            margin: 10px;  
            float: left;
            background-color: #5c5c5c41;
        }
        a.back:hover{
            background-color: #08080841;
        }
        .certain_example{
            width: fit-content;
            gap:0px;
            text-align: right;
            position: relative;
            display:inline-block;
            background-color: transparent;
        }
        .text{
            width: fit-content;
            height: fit-content;
            position: relative;
            display:inline-block;
        }
        select{
            display: inline-block;
            padding: 3px 80px 3px 0px;
            border:0px;
            background-color: #c0c0c0;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            
        }
        option{
            padding: 3px 80px 3px 0px;
            border:0px;
            background-color: #c0c0c0;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        
        }
        option:focus,
        option:hover,
        option:checked{
            outline: none;
            box-shadow: none; 
            border:0px;
        }
        
        ul{
            
            list-style: none;
            padding-left: 0px;
        }
        select:focus{
            outline: none;
            box-shadow: none; 
            border:0px;
        }
        
        select:hover{
            background-color: #acacac;
        }
        .kontext{
            width: 100px;
            height: fit-content;
            position: relative;
            display:inline-block;
            margin-right: 10px;
            padding-right: 0px;
            text-align: right;
        }
        hr{
            width: 180px;
        }
        h1{
            margin: 0px;
        }
        h4{
            padding: 0px 0px 0px 0px;
            margin: 0px 0px 0px 0px;
            color: #dedede;
        }
        form{
            display:inline;
        }
        button:hover{
            background-color: #0056b3;
        }

    </style>
</head>
<body>
    <div style="width: 100%;padding: 0 0 0 0;">
        <a class="back" href="{{ url_for('times') }}">Back</a>
    </div>
    <div class="displayer">
        <h1>El presente</h1>
        <h4>Verb: {{verb}}</h4>
        <form method="post" action="{{ url_for('presente_backward') }}">
        <ul>
            
            <li>
                <div class="certian_example"> 
                <p class="kontext">yo</p> <p class="text">{{const}}</p>
                
                <select name="sI">
                    <option disabled selected hidden>...</option>
                    {% for i in endingsI %}
                        <option value="{{i}}">{{i}}</option>
                    {% endfor %}
                </select>
            </div></li>

            <li><div class="certian_example"> 
                <p class="kontext">tú</p> <p class="text">{{const}}</p>
                <select name="sII">
                    <option disabled selected hidden>...</option>
                    {% for i in endingsI %}
                        <option value="{{i}}">{{i}}</option>
                    {% endfor %}
                </select>
                </div></li>

            <li><div class="certian_example"> 
                <p class="kontext">él|ella</p> <p class="text">{{const}}</p>
                <select name="sIII">
                    <option disabled selected hidden>...</option>
                    {% for i in endingsI %}
                        <option value="{{i}}">{{i}}</option>
                    {% endfor %}
                </select>
                </div></li>

            <li><div class="certian_example"> 
                <p class="kontext">nosotr-os|as</p> <p class="text">{{const}}</p>
                <select name="sIV">
                    <option disabled selected hidden>...</option>
                    {% for i in endingsI %}
                        <option value="{{i}}">{{i}}</option>
                    {% endfor %}
                </select>
                </div></li>

            <li><div class="certian_example"> 
                <p class="kontext">vostr-os|as</p> <p class="text">{{const}}</p>
                <select name="sV">
                    <option disabled selected hidden>...</option>
                    {% for i in endingsI %}
                        <option value="{{i}}">{{i}}</option>
                    {% endfor %}
                </select>
                </div></li>

            <li><div class="certian_example"> 
                <p class="kontext">ell-os|as</p> <p class="text">{{const}}</p>
                <select name="sVI">
                    <option disabled selected hidden>...</option>
                    {% for i in endingsI %}
                        <option value="{{i}}">{{i}}</option>
                    {% endfor %}
                </select>
                </div></li>

                <div class="certain_example">
                    <button type="submit">Check</button>
                </div>

        </ul>
        </form>
    
</body>
</html>
